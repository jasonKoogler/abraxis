services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Migrations (run once, then exit)
  # ---------------------------------------------------------------------------
  migrate-aegis:
    image: migrate/migrate
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/aegis_db?sslmode=disable
      - up
    volumes:
      - ./aegis/deploy/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  migrate-prism:
    image: migrate/migrate
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/prism_db?sslmode=disable
      - up
    volumes:
      - ./prism/deploy/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Services
  # ---------------------------------------------------------------------------
  aegis:
    build:
      context: .
      dockerfile: docker/aegis.Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
      - "40000:40000"
    environment:
      GOFLAGS: -buildvcs=false
      ENV: development
      LOG_LEVEL: debug
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aegis_db
      POSTGRES_SSL_MODE: disable
      POSTGRES_TIMEZONE: UTC
      POSTGRES_TIMEOUT: 30s
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis
      REDIS_USERNAME: default
      HTTP_SERVER_PORT: "8080"
      HTTP_SERVER_READ_TIMEOUT: 10s
      HTTP_SERVER_WRITE_TIMEOUT: 10s
      HTTP_SERVER_IDLE_TIMEOUT: 10s
      HTTP_SERVER_SHUTDOWN_TIMEOUT: 10s
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      USE_REDIS_RATE_LIMITER: "false"
      RATE_LIMIT_REQUESTS_PER_SECOND: "100"
      RATE_LIMIT_BURST: "150"
      RATE_LIMIT_TTL: 1h
      JWT_ISSUER: aegis
      GOOGLE_KEY: placeholder
      GOOGLE_SECRET: placeholder
      GOOGLE_CALLBACK_URL: http://localhost:8080/auth/google/callback
      GOOGLE_SCOPES: "https://www.googleapis.com/auth/userinfo.email,https://www.googleapis.com/auth/userinfo.profile"
      # Add FACEBOOK_KEY, TWITTER_KEY etc. to enable additional OAuth providers
      OAUTH_VERIFIER_STORAGE: redis
      SESSION_MANAGER: redis
      USE_CUSTOM_JWT: "true"
      ACCESS_TOKEN_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 24h
      TOKEN_ROTATION_INTERVAL: 168h
      GRPC_PORT: "9090"
      GRPC_ENABLED: "true"
    working_dir: /workspace/aegis
    volumes:
      - .:/workspace
      - aegis-go-cache:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-aegis:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  prism:
    build:
      context: .
      dockerfile: docker/prism.Dockerfile
    ports:
      - "8081:8080"
      - "40001:40000"
    environment:
      GOFLAGS: -buildvcs=false
      ENV: development
      LOG_LEVEL: debug
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prism_db
      POSTGRES_SSL_MODE: disable
      POSTGRES_TIMEZONE: UTC
      POSTGRES_TIMEOUT: 30s
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis
      REDIS_USERNAME: default
      HTTP_SERVER_PORT: "8080"
      HTTP_SERVER_READ_TIMEOUT: 10s
      HTTP_SERVER_WRITE_TIMEOUT: 10s
      HTTP_SERVER_IDLE_TIMEOUT: 10s
      HTTP_SERVER_SHUTDOWN_TIMEOUT: 10s
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      USE_REDIS_RATE_LIMITER: "false"
      RATE_LIMIT_REQUESTS_PER_SECOND: "100"
      RATE_LIMIT_BURST: "150"
      RATE_LIMIT_TTL: 1h
      JWT_ISSUER: aegis
      GOOGLE_KEY: placeholder
      GOOGLE_SECRET: placeholder
      GOOGLE_CALLBACK_URL: http://localhost:8080/auth/google/callback
      GOOGLE_SCOPES: "https://www.googleapis.com/auth/userinfo.email,https://www.googleapis.com/auth/userinfo.profile"
      # Add FACEBOOK_KEY, TWITTER_KEY etc. to enable additional OAuth providers
      OAUTH_VERIFIER_STORAGE: redis
      SESSION_MANAGER: redis
      USE_CUSTOM_JWT: "true"
      ACCESS_TOKEN_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 24h
      TOKEN_ROTATION_INTERVAL: 168h
      AEGIS_GRPC_ADDRESS: aegis:9090
      AEGIS_SYNC_ENABLED: "true"
      AEGIS_CACHE_TTL: 60s
      AEGIS_RECONNECT_MAX_BACKOFF: 30s
      AEGIS_JWKS_URL: http://aegis:8080/.well-known/jwks.json
      AEGIS_JWKS_REFRESH_INTERVAL: 5m
    working_dir: /workspace/prism
    volumes:
      - .:/workspace
      - prism-go-cache:/root/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate-prism:
        condition: service_completed_successfully
      aegis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  pg-data:
  redis-data:
  aegis-go-cache:
  prism-go-cache:
